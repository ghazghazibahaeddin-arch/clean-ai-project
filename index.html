<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant | Groq Powered</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #000000;
            --bg-color: #f4f4f9;
            --chat-bg: #ffffff;
            --user-msg: #007bff;
            --ai-msg: #f0f0f5;
            --text-dark: #1a1a1a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 85vh;
            background: var(--chat-bg);
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-radius: 20px;
            overflow: hidden;
        }

        .chat-header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafafa;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user {
            align-self: flex-end;
            background: var(--user-msg);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .ai {
            align-self: flex-start;
            background: var(--ai-msg);
            color: var(--text-dark);
            border-bottom-left-radius: 2px;
        }

        .typing-indicator {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 10px;
            display: none;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            border-color: var(--user-msg);
        }

        button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">AI Chat Assistant</div>
    <div id="chat-box">
        <div class="message ai">Hello! How can I help you today?</div>
    </div>
    <div id="typing" class="typing-indicator" style="padding-left: 20px;">AI is thinking...</div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing');

    function appendMessage(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // User Message
        appendMessage('user', text);
        userInput.value = '';
        sendBtn.disabled = true;
        typingIndicator.style.display = 'block';

        try {
            // Pointing to your Vercel Serverless Function
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: text })
            });

            const data = await response.json();
            typingIndicator.style.display = 'none';

            if (response.ok && data.choices && data.choices[0]) {
                const aiReply = data.choices[0].message.content;
                appendMessage('ai', aiReply);
            } else {
                const errorMsg = data.error?.message || "Something went wrong.";
                appendMessage('ai', "❌ Error: " + errorMsg);
            }
        } catch (error) {
            typingIndicator.style.display = 'none';
            appendMessage('ai', "❌ Connection failed. Check your Vercel logs.");
            console.error("Fetch Error:", error);
        } finally {
            sendBtn.disabled = false;
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
