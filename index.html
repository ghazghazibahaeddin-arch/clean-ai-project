<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ Secure AI Gateway | بوابة الذكاء الاصطناعي الآمنة</title>
    <style>
        :root {
            --bg-color: #0b0e11;
            --card-bg: #15191c;
            --user-bubble: #0070f3;
            --ai-bubble: #2d3339;
            --text-main: #e0e0e0;
            --border-color: #2d3339;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            align-items: center;
        }

        /* الهيدر الاحترافي */
        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 14, 17, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h2 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; }

        /* منطقة الدردشة */
        #chat-container {
            flex: 1;
            width: 100%;
            max-width: 800px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* تصميم الفقاعات */
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
        }

        .user-msg {
            align-self: flex-start; /* لليسار لأن اللغة عربية */
            background-color: var(--user-bubble);
            color: white;
            border-bottom-left-radius: 2px;
        }

        .ai-msg {
            align-self: flex-end; /* لليمين */
            background-color: var(--ai-bubble);
            border: 1px solid #3e444b;
            border-bottom-right-radius: 2px;
        }

        /* منطقة الإدخال */
        .input-wrapper {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            background: var(--bg-color);
            border-top: 1px solid var(--border-color);
        }

        .input-area {
            display: flex;
            gap: 10px;
            background: var(--card-bg);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            outline: none;
            font-size: 1rem;
        }

        button {
            background: var(--user-bubble);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; }

        #status {
            text-align: center;
            font-size: 0.75rem;
            color: #666;
            margin-top: 10px;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <h2>🛡️ Secure AI Gateway</h2>
    </header>

    <div id="chat-container">
        <div class="message ai-msg">مرحباً بك في البوابة الآمنة. كيف يمكنني مساعدتك اليوم؟ جميع بياناتك محمية بنظام الحجب النشط.</div>
    </div>

    <div class="input-wrapper">
        <div class="input-area">
            <input type="text" id="user-input" placeholder="اكتب رسالتك الآمنة هنا..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">إرسال</button>
        </div>
        <div id="status">✅ النظام جاهز | درع الخصوصية مفعل</div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const status = document.getElementById('status');
            const chatContainer = document.getElementById('chat-container');
            const prompt = input.value.trim();

            if (!prompt) return;

            // إضافة رسالة المستخدم للواجهة
            appendMessage('user', prompt);
            input.value = "";
            status.innerText = "⏳ جاري المعالجة الآمنة...";

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();

                if (response.ok) {
                    appendMessage('ai', data.reply);
                    status.innerHTML = `✅ اتصال آمن نشط | Shield: ${data.governance_log?.shield_active ? 'ON 🛡️' : 'Clean ✨'}`;
                } else {
                    status.innerText = "❌ خطأ: " + (data.error || "مشكلة في الخادم");
                }
            } catch (e) {
                status.innerText = "❌ فشل الاتصال بالبوابة.";
            }
            
            // التمرير لأسفل تلقائياً
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendMessage(sender, text) {
            const chatContainer = document.getElementById('chat-container');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender === 'user' ? 'user-msg' : 'ai-msg'}`;
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
