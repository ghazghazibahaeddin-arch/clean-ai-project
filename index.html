<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SHIELD | SaaS Gateway</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #050505; --card: #0c0c0c; --primary: #0070f3; --accent: #00dfd8; --text: #ffffff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Auth Screen */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid #1a1a1a; width: 400px; text-align: center; }
        
        /* Main UI */
        #app { display: none; flex: 1; display: flex; flex-direction: column; }
        .sidebar { width: 280px; background: var(--card); border-right: 1px solid #1a1a1a; padding: 30px; }
        .main-content { flex: 1; padding: 40px; display: flex; flex-direction: column; gap: 20px; }
        .chat-box { flex: 1; background: #080808; border-radius: 20px; border: 1px solid #1a1a1a; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        input, button { padding: 15px; border-radius: 12px; border: 1px solid #222; outline: none; }
        input { background: #151515; color: white; width: 100%; box-sizing: border-box; }
        button { background: var(--primary); color: white; cursor: pointer; font-weight: bold; border: none; }
        
        .redacted { color: var(--accent); font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1 style="color: var(--accent);">🛡️ AI SHIELD</h1>
            <p style="color: #666;">Enterprise Privacy Firewall</p>
            <input type="password" id="sk_input" placeholder="Enter License Key (sk_live_...)">
            <button onclick="authenticate()" style="width: 100%; margin-top: 15px;">ACTIVATE SYSTEM</button>
        </div>
    </div>

    <div id="app" style="display: none; flex-direction: row; width: 100%;">
        <div class="sidebar">
            <h3>📊 Dashboard</h3>
            <div style="background: #111; padding: 15px; border-radius: 12px; margin-bottom: 20px;">
                <small style="color: #555;">PII BLOCKED</small>
                <div id="count" style="font-size: 2rem; font-weight: 800; color: var(--accent);">0</div>
            </div>
            <button onclick="downloadAudit()" style="width: 100%; background: #111; border: 1px solid #222;">📥 Download Audit</button>
        </div>

        <div class="main-content">
            <header style="display: flex; justify-content: space-between;">
                <h2>Security Gateway</h2>
                <span style="color: #27ae60;">● SYSTEM PROTECTED</span>
            </header>

            <div id="chat" class="chat-box">
                <div style="color: #444; text-align: center;">--- Secure Session Started ---</div>
            </div>

            <div style="display: flex; gap: 10px;">
                <input type="text" id="userInput" placeholder="Type message... (Test: john@gmail.com)">
                <button onclick="process()">SECURE SEND</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://xjjuvagvfaocvszztkgh.supabase.co";
        const SB_KEY = "sb_publishable_vhoqtLU78J0jm5vVb5P0Jg_OFMXQ4Fl";
        let stats = 0;
        let activeClient = null;

        async function authenticate() {
            const key = document.getElementById('sk_input').value;
            // التحقق من قاعدة البيانات
            const res = await fetch(`${SB_URL}/rest/v1/customers?api_key=eq.${key}`, {
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
            });
            const data = await res.json();

            if(data.length > 0) {
                activeClient = data[0];
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
            } else {
                alert("Invalid Enterprise Key");
            }
        }

        function scrub(text) {
            const rules = { EMAIL: /[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}/gi, PHONE: /\+?\d{10,15}/g };
            let clean = text; let hit = false;
            for(let [type, reg] of Object.entries(rules)) {
                if(reg.test(clean)) {
                    clean = clean.replace(reg, `[REDACTED_${type}]`);
                    hit = true; stats++;
                }
            }
            return { clean, hit };
        }

        async function logToCloud(type) {
            await fetch(`${SB_URL}/rest/v1/audit_logs`, {
                method: 'POST',
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ customer_id: activeClient.id, pii_type: type, action_taken: 'BLOCKED' })
            });
        }

        function process() {
            const inp = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const { clean, hit } = scrub(inp.value);

            chat.innerHTML += `<div style="text-align:right; margin-bottom:10px;"><b>You:</b> ${inp.value}</div>`;
            if(hit) {
                chat.innerHTML += `<div class="redacted">🛡️ AI Shield: Sensitive data detected and masked.</div>`;
                document.getElementById('count').innerText = stats;
                logToCloud('PII_ALERT');
            }
            
            chat.innerHTML += `<div style="color: #666;">AI: [Processing secure request...]</div>`;
            inp.value = "";
            chat.scrollTop = chat.scrollHeight;
        }

        function downloadAudit() {
            const content = `CLEAN-AI AUDIT\nClient: ${activeClient.name}\nPII Blocked: ${stats}\nStatus: Compliant`;
            const blob = new Blob([content], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "Audit_Report.txt"; a.click();
        }
    </script>
</body>
</html>
