<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعدك الذكي - Groq AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --chat-bg: #ffffff;
            --user-msg: #2563eb;
            --ai-msg: #f1f5f9;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background: var(--chat-bg);
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 15px;
            overflow: hidden;
        }

        .header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user {
            align-self: flex-start;
            background: var(--user-msg);
            color: white;
            border-bottom-left-radius: 2px;
        }

        .ai {
            align-self: flex-end;
            background: var(--ai-msg);
            color: #334155;
            border-bottom-right-radius: 2px;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--primary-color); }

        button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* تأثير النبض أثناء التفكير */
        .typing { font-style: italic; color: #94a3b8; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">مساعد Groq الذكي ⚡</div>
    <div id="chat-box">
        <div class="message ai">مرحباً! كيف يمكنني مساعدتك اليوم؟</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="اكتب سؤالك هنا..." autocomplete="off">
        <button id="send-btn">إرسال</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function appendMessage(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage('user', text);
        userInput.value = '';
        sendBtn.disabled = true;

        // إضافة مؤشر انتظار بسيط
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message ai typing';
        loadingDiv.innerText = 'جاري التفكير...';
        chatBox.appendChild(loadingDiv);

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: text })
            });

            const data = await response.json();
            chatBox.removeChild(loadingDiv); // إزالة مؤشر الانتظار

            if (data.choices && data.choices[0]) {
                appendMessage('ai', data.choices[0].message.content);
            } else {
                throw new Error();
            }
        } catch (error) {
            chatBox.removeChild(loadingDiv);
            appendMessage('ai', '❌ عذراً، حدث خطأ في الاتصال. حاول مرة أخرى.');
        } finally {
            sendBtn.disabled = false;
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
  </html>
