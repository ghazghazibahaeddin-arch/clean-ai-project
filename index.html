<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Shield</title>

<style>
body{
font-family:Arial;
background:#0a0a0a;
color:white;
margin:0;
display:flex;
flex-direction:column;
height:100vh;
}

header{
padding:20px;
background:#111;
border-bottom:1px solid #222;
}

#chat{
flex:1;
overflow:auto;
padding:20px;
}

.msg{
padding:12px;
border-radius:10px;
margin-bottom:10px;
max-width:70%;
}

.user{
background:#2563eb;
align-self:flex-end;
}

.ai{
background:#222;
}

#inputArea{
display:flex;
padding:20px;
gap:10px;
background:#111;
}

input{
flex:1;
padding:12px;
background:#222;
border:none;
color:white;
border-radius:8px;
}

button{
background:#2563eb;
border:none;
color:white;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h2>🛡 AI Shield Gateway</h2>
</header>

<div id="chat"></div>

<div id="inputArea">
<input id="prompt" placeholder="Type message..." />
<button onclick="send()">Send</button>
</div>

<script>

function scrub(text){

const email=/[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-z]{2,}/g
const phone=/\+?\d{10,15}/g

let clean=text

clean=clean.replace(email,"[REDACTED_EMAIL]")
clean=clean.replace(phone,"[REDACTED_PHONE]")

return clean
}

function addMsg(text,type){

const div=document.createElement("div")
div.className="msg "+type
div.innerText=text

document.getElementById("chat").appendChild(div)
}

async function send(){

const input=document.getElementById("prompt")

const text=input.value

if(!text) return

addMsg(text,"user")

const clean=scrub(text)

input.value=""

try{

const res=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt:clean
})
})

const data=await res.json()

addMsg(data.reply,"ai")

}catch(e){

addMsg("Server error","ai")

}

}

</script>

</body>
</html>
