<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ AI Secure Gateway</title>
    <style>
        /* هذا الجزء هو الذي سيغير الشكل تماماً */
        body { background: #0b0e11; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 12px; border-radius: 15px; line-height: 1.4; }
        .user-msg { align-self: flex-start; background: #0070f3; color: white; border-bottom-left-radius: 2px; }
        .ai-msg { align-self: flex-end; background: #2d3339; color: #e0e0e0; border: 1px solid #333; border-bottom-right-radius: 2px; }
        .input-area { padding: 20px; background: #0b0e11; border-top: 1px solid #222; display: flex; gap: 10px; }
        input { flex: 1; background: #15191c; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; outline: none; }
        button { background: #0070f3; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #status { text-align: center; font-size: 11px; color: #666; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div id="chat-container"></div>
    <div id="status">✅ Privacy Shield Active</div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="اكتب رسالتك..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chat = document.getElementById('chat-container');
            const prompt = input.value.trim();
            if(!prompt) return;

            // إضافة رسالة المستخدم
            chat.innerHTML += `<div class="message user-msg">${prompt}</div>`;
            input.value = "";

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });
                const data = await res.json();
                // إضافة رد الذكاء الاصطناعي
                chat.innerHTML += `<div class="message ai-msg">${data.reply}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="message ai-msg" style="color:red">Connection Error</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
  </html>
