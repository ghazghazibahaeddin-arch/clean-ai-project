<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure AI Gateway</title>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chat-box { width: 100%; max-width: 600px; height: 400px; border: 1px solid #333; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 8px; background: #1a1a1a; }
        .input-area { display: flex; width: 100%; max-width: 600px; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #status { margin-top: 10px; font-size: 0.8rem; color: #888; }
        .user-msg { color: #007bff; margin-bottom: 10px; }
        .ai-msg { color: #28a745; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>🛡️ Secure AI Gateway</h2>
    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your secure message...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <div id="status">✅ System Ready | Privacy Shield Active</div>

    <script>
        // هذا هو الجزء الذي كان يظهر كنص، الآن هو داخل وسم script ليعمل برمجياً
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const status = document.getElementById('status');
            const chatBox = document.getElementById('chat-box');
            const prompt = input.value;

            if(!prompt) return;

            status.innerText = "⏳ Shield Active: Processing...";
            chatBox.innerHTML += `<div class="user-msg"><b>You:</b> ${prompt}</div>`;
            input.value = "";

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();

                if (response.ok) {
                    chatBox.innerHTML += `<div class="ai-msg"><b>AI:</b> ${data.reply}</div>`;
                    status.innerText = "✅ Secure Connection Active";
                } else {
                    status.innerText = "❌ Error: " + (data.error || "Server Issue");
                }
            } catch (e) {
                status.innerText = "❌ Fatal: API Connection Lost.";
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
