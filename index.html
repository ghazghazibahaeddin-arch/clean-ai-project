<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI SHIELD | Enterprise Dashboard</title>
    <style>
        :root { --bg: #0b0e11; --card: #15191c; --primary: #0070f3; --danger: #ff4d4d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 250px; background: var(--card); border-right: 1px solid #333; padding: 20px; }
        .main { flex: 1; display: flex; flex-direction: column; padding: 20px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #1c2128; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .chat-container { flex: 1; background: #0d1117; border-radius: 15px; border: 1px solid #333; display: flex; flex-direction: column; overflow: hidden; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 70%; padding: 10px 15px; border-radius: 15px; font-size: 0.9rem; }
        .ai { background: #2d3339; align-self: flex-start; }
        .user { background: var(--primary); align-self: flex-end; }
        .input-box { padding: 15px; background: #161b22; display: flex; gap: 10px; }
        input { flex: 1; background: #0d1117; border: 1px solid #333; color: white; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🛡️ AI SHIELD</h2>
        <p style="color: #666; font-size: 0.8rem;">Status: <span style="color: #4cd137;">ONLINE</span></p>
        <hr style="border: 0.5px solid #333;">
        <nav>
            <p>📊 Analytics</p>
            <p>🔐 Privacy Logs</p>
            <p>💳 Billing</p>
        </nav>
    </div>
    <div class="main">
        <div class="stats">
            <div class="stat-card"><h3>Queries</h3><div>1,429</div></div>
            <div class="stat-card"><h3>Blocked Leaks</h3><div style="color: var(--danger);">32</div></div>
            <div class="stat-card"><h3>Security Score</h3><div style="color: #4cd137;">98%</div></div>
        </div>
        <div class="chat-container">
            <div id="messages">
                <div class="bubble ai">Enterprise Security Shield active. How can I help?</div>
            </div>
            <div class="input-box">
                <input type="text" placeholder="Type secure message..." onkeypress="if(event.key==='Enter') send()">
                <button onclick="send()" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">SEND</button>
            </div>
        </div>
    </div>
    <script>
        function send() {
            const msg = document.querySelector('input').value;
            if(!msg) return;
            document.getElementById('messages').innerHTML += `<div class="bubble user">${msg}</div>`;
            document.querySelector('input').value = "";
        }
    </script>
</body>
</html>
