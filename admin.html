<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الأمنية | AI Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0a; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #161616; padding: 20px; border-radius: 12px; border: 1px solid #222; text-align: center; }
        .stat-card h3 { font-size: 0.9rem; color: #888; margin: 0; }
        .stat-card p { font-size: 1.8rem; font-weight: bold; margin: 10px 0 0; color: #007bff; }
        .stat-card.danger p { color: #ff4d4d; }
        table { width: 100%; border-collapse: collapse; background: #161616; border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #222; }
        th { background: #1f1f1f; color: #888; font-weight: 500; }
        .shield-badge { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; border: 1px solid #ff4d4d; }
        .safe-badge { background: rgba(40, 167, 69, 0.1); color: #28a745; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🛡️ مراقب أمن الذكاء الاصطناعي</h1>
        <button onclick="fetchLogs()" style="padding: 10px; cursor: pointer;">تحديث البيانات 🔄</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>إجمالي العمليات</h3>
            <p id="total-calls">0</p>
        </div>
        <div class="stat-card danger">
            <h3>بيانات محجوبة (Shield)</h3>
            <p id="shield-count">0</p>
        </div>
        <div class="stat-card">
            <h3>التوفير المقدر</h3>
            <p id="savings">$0.00</p>
        </div>
    </div>

    <h3>سجل المحادثات الأخير</h3>
    <table>
        <thead>
            <tr>
                <th>التاريخ</th>
                <th>النص المدخل</th>
                <th>حالة الحماية</th>
                <th>التكلفة</th>
            </tr>
        </thead>
        <tbody id="logs-table">
            </tbody>
    </table>
</div>

<script>
    // إعدادات سوبابيس (سيتم جلبها من البيئة أو وضعها هنا مؤقتاً)
    const SUPABASE_URL = "رابط_مشروعك_هنا"; 
    const SUPABASE_KEY = "مفتاح_anon_الخاص_بك";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function fetchLogs() {
        let { data: ai_logs, error } = await supabase
            .from('ai_logs')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) { console.error(error); return; }

        // تحديث الإحصائيات
        document.getElementById('total-calls').innerText = ai_logs.length;
        const shielded = ai_logs.filter(log => log.shield_active).length;
        document.getElementById('shield-count').innerText = shielded;
        
        const totalCost = ai_logs.reduce((acc, log) => acc + (log.estimated_cost || 0), 0);
        document.getElementById('savings').innerText = `$${(totalCost * 5).toFixed(2)}`; // افتراض توفير 5 أضعاف عن API العادي

        // تحديث الجدول
        const tableBody = document.getElementById('logs-table');
        tableBody.innerHTML = '';
        ai_logs.forEach(log => {
            tableBody.innerHTML += `
                <tr>
                    <td>${new Date(log.created_at).toLocaleString('ar-EG')}</td>
                    <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis;">${log.prompt_text}</td>
                    <td>${log.shield_active ? '<span class="shield-badge">محجوب 🛡️</span>' : '<span class="safe-badge">آمن ✨</span>'}</td>
                    <td>$${log.estimated_cost?.toFixed(5) || '0.00'}</td>
                </tr>
            `;
        });
    }

    fetchLogs();
</script>

</body>
</html>
