<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Governance | Control Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #0070f3; --danger: #ff0000; --bg: #000; --card-bg: #111; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        
        /* Dashboard Layout */
        .admin-wrapper { max-width: 1200px; margin: 0 auto; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #333; }
        
        /* Stats Cards */
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .card h3 { color: #888; font-size: 0.8rem; text-transform: uppercase; margin: 0; }
        .card .value { font-size: 2.2rem; font-weight: 800; margin: 10px 0; }
        
        /* Table Design */
        .table-wrapper { margin-top: 40px; background: var(--card-bg); border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a1a1a; color: #888; padding: 15px; text-align: right; font-size: 0.9rem; }
        td { padding: 15px; border-bottom: 1px solid #222; font-size: 0.9rem; }
        
        /* Status Badges */
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .shield-on { background: rgba(255, 0, 0, 0.2); color: #ff4d4d; border: 1px solid #ff4d4d; }
        .shield-off { background: rgba(0, 112, 243, 0.2); color: #0070f3; border: 1px solid #0070f3; }

        .refresh-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <div class="nav-bar">
        <div>
            <h1 style="margin:0; font-size: 1.5rem;">🛡️ AI Admin Terminal</h1>
            <p style="color:#666; font-size: 0.8rem;">نظام الرقابة والحماية النشط</p>
        </div>
        <button class="refresh-btn" onclick="fetchLogs()">تحديث السجلات 🔄</button>
    </div>

    

    <div class="stats-container">
        <div class="card">
            <h3>إجمالي الاستعلامات</h3>
            <div class="value" id="total-queries">0</div>
        </div>
        <div class="card">
            <h3>محاولات تسريب محجوبة</h3>
            <div class="value" style="color: var(--danger);" id="blocked-count">0</div>
        </div>
        <div class="card">
            <h3>التوفير المالي (SaaS Savings)</h3>
            <div class="value" style="color: #28a745;" id="savings-value">$0.00</div>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>الوقت</th>
                    <th>الطلب (Prompt)</th>
                    <th>نظام الحماية</th>
                    <th>التكلفة الفردية</th>
                </tr>
            </thead>
            <tbody id="logs-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    // استخدم بياناتك الحقيقية هنا
    const SUPABASE_URL = "https://your-project.supabase.co";
    const SUPABASE_KEY = "your-anon-key";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function fetchLogs() {
        const { data, error } = await _supabase
            .from('ai_logs')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) return console.error(error);

        // Update UI Stats
        document.getElementById('total-queries').innerText = data.length;
        const blocked = data.filter(i => i.shield_active).length;
        document.getElementById('blocked-count').innerText = blocked;
        
        const totalCost = data.reduce((acc, curr) => acc + (curr.estimated_cost || 0), 0);
        document.getElementById('savings-value').innerText = `$${(totalCost * 12).toFixed(2)}`;

        // Update Table
        const body = document.getElementById('logs-body');
        body.innerHTML = data.map(log => `
            <tr>
                <td>${new Date(log.created_at).toLocaleTimeString('ar-EG')}</td>
                <td>${log.prompt_text.substring(0, 50)}...</td>
                <td>
                    <span class="badge ${log.shield_active ? 'shield-on' : 'shield-off'}">
                        ${log.shield_active ? 'محجوب 🛡️' : 'آمن ✨'}
                    </span>
                </td>
                <td>$${(log.estimated_cost || 0).toFixed(5)}</td>
            </tr>
        `).join('');
    }

    fetchLogs();
    // تحديث تلقائي كل 30 ثانية
    setInterval(fetchLogs, 30000);
</script>

</body>
</html>
