<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Shield Dashboard</title>
    <style>
        body { background: #010409; color: white; font-family: sans-serif; padding: 40px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: #0d1117; padding: 25px; border-radius: 12px; border: 1px solid #30363d; }
        .card h3 { color: #8b949e; font-size: 0.8rem; margin: 0; }
        .card div { font-size: 2rem; font-weight: bold; margin-top: 10px; color: #58a6ff; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #30363d; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>Security Operations Center</h1>
    <div class="stats">
        <div class="card"><h3>TOTAL TRAFFIC</h3><div>1.2k</div></div>
        <div class="card"><h3>LEAKS BLOCKED</h3><div style="color:#f85149">42</div></div>
        <div class="card"><h3>COST SAVED</h3><div style="color:#3fb950">$840.20</div></div>
    </div>
    <table>
        <thead><tr><th>Timestamp</th><th>Status</th><th>Security Layer</th></tr></thead>
        <tbody>
            <tr><td>14:32:10</td><td style="color:#3fb950">SECURE</td><td>PII Masking</td></tr>
            <tr><td>14:30:05</td><td style="color:#f85149">BLOCKED</td><td>API Leak Prevention</td></tr>
        </tbody>
    </table>
</body>
</html>
