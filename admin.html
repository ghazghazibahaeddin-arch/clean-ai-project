<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI SHIELD | Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050505; color: white; padding: 50px; }
        .box { background: #0c0c0c; border: 1px solid #1a1a1a; padding: 30px; border-radius: 20px; max-width: 800px; margin: auto; }
        input { background: #151515; border: 1px solid #222; color: white; padding: 12px; border-radius: 8px; width: 60%; }
        button { background: #0070f3; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .key-list { margin-top: 30px; border-top: 1px solid #1a1a1a; padding-top: 20px; }
        .key-item { display: flex; justify-content: space-between; padding: 10px; background: #111; margin-bottom: 5px; border-radius: 5px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🛡️ Admin Control</h1>
        <p>Generate license keys for your customers.</p>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="cName" placeholder="Customer Name...">
            <button onclick="createKey()">Generate Key</button>
        </div>
        <div class="key-list" id="list"></div>
    </div>

    <script>
        const SB_URL = "https://xjjuvagvfaocvszztkgh.supabase.co";
        const SB_KEY = "sb_publishable_vhoqtLU78J0jm5vVb5P0Jg_OFMXQ4Fl";

        async function createKey() {
            const name = document.getElementById('cName').value;
            if(!name) return;
            const key = "sk_live_" + Math.random().toString(36).substr(2, 12);

            await fetch(`${SB_URL}/rest/v1/customers`, {
                method: 'POST',
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, api_key: key, plan: 'Pro' })
            });
            alert("Created: " + key);
            load();
        }

        async function load() {
            const res = await fetch(`${SB_URL}/rest/v1/customers`, {
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
            });
            const data = await res.json();
            document.getElementById('list').innerHTML = data.map(i => `
                <div class="key-item">
                    <span>${i.name}</span>
                    <span style="color: #00dfd8">${i.api_key}</span>
                </div>
            `).join('');
        }
        load();
    </script>
</body>
</html>
