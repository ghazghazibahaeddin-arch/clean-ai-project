<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | AI Governance</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #010409; color: white; font-family: sans-serif; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .stat-card { background: #0d1117; padding: 30px; border-radius: 12px; border: 1px solid #30363d; }
        .stat-card h3 { color: #8b949e; margin: 0; font-size: 0.8rem; }
        .stat-card div { font-size: 2rem; font-weight: bold; margin-top: 10px; color: #58a6ff; }
        .danger { color: #f85149 !important; }
        table { width: 100%; margin-top: 40px; border-collapse: collapse; background: #0d1117; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #30363d; }
    </style>
</head>
<body>
    <h1>AI Governance Dashboard</h1>
    <div class="grid">
        <div class="stat-card"><h3>TOTAL QUERIES</h3><div id="t-q">0</div></div>
        <div class="stat-card"><h3>BLOCKED LEAKS</h3><div id="b-l" class="danger">0</div></div>
        <div class="stat-card"><h3>ESTIMATED SAVINGS</h3><div id="e-s" style="color:#3fb950">$0.00</div></div>
    </div>
    <table id="logs">
        <thead><tr><th>Time</th><th>Prompt Excerpt</th><th>Status</th></tr></thead>
        <tbody></tbody>
    </table>
    
    <script>
        // ADD YOUR SUPABASE KEYS HERE
        const supabaseUrl = 'YOUR_URL';
        const supabaseKey = 'YOUR_KEY';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        async function load() {
            const { data } = await client.from('ai_logs').select('*').order('created_at', {ascending: false});
            document.getElementById('t-q').innerText = data.length;
            document.getElementById('b-l').innerText = data.filter(d => d.shield_active).length;
            const table = document.querySelector('#logs tbody');
            table.innerHTML = data.map(d => `<tr><td>${new Date(d.created_at).toLocaleTimeString()}</td><td>${d.prompt_text.slice(0,30)}...</td><td>${d.shield_active ? '🔴 BLOCKED' : '🟢 SECURE'}</td></tr>`).join('');
        }
        load();
    </script>
</body>
</html>
